services:
  httpbin:
    image: ${DOCKER_TAG:-go-httpbin:e2e-test}
    ports:
      - "18080:8080"
    environment:
      - RATE_LIMIT_RATE=10
      - RATE_LIMIT_BURST=5
      - MAX_DURATION=10s
      - LOG_LEVEL=DEBUG
      - TRUSTED_PROXIES=172.16.0.0/12,10.0.0.0/8,192.168.0.0/16

  nginx:
    image: docker.io/nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - httpbin
